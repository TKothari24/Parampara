<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Parampara</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  
</head>
<body>
        

  <header>
    <div class="navbar">
      <a class="logo border" href="index.html">Parampara</a>
      <div class="nav-links">
        <a class="Home border" href="index.html"><p>Home</p></a>
        <a class="Festival border" href="shop-fest.html"><p>Festival Specials</p></a>
        <a class="Seller border" href="shop-state.html"><p>State Specials</p></a>
        <a class="About border" href="about.html"><p>About Us</p></a>
        <a class="Contact border" href="contact.html"><p>Contact Us</p></a>
        <!-- No Logout/username on this page by design -->
      </div>
    </div>
  </header>

  <!-- Login Form -->
  <section class="section">
    <h2>Login to Parampara</h2>
    <form id="loginForm" class="auth-form">
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Login</button>
      <p>Don’t have an account? <a href="signup.html">Sign Up</a></p>
    </form>

    <!-- Guest Login Link (demo shortcut removed) -->
    <p style="text-align:center; margin-top:16px;">
      <a href="index.html" class="guest-link" style="font-weight:700; color:#e86c28; text-decoration:none;">
        <i class="fa-solid fa-user"></i> Login as a guest user
      </a>
    </p>
  </section>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
